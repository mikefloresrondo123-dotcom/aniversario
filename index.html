<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Te amo pau mi princesita hermosa</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    touch-action: none;
}

/* canvas estrellas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    will-change: transform;
}

/* título */
h1 {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: clamp(0.9rem, 4vmin, 2rem);
    top: 12px;
    padding: 0 12px;
    box-sizing: border-box;
    color: #fff;
    text-shadow: 0 0 10px #0077ff, 0 0 20px #00ffff;
    z-index: 2;
    animation: entradaTitulo 2s ease-out forwards;
    line-height: 1.3;
}

@keyframes entradaTitulo {
    0%   { opacity: 0; transform: translateY(-20px); filter: blur(10px); }
    100% { opacity: 1; transform: translateY(0);     filter: blur(0); }
}

/* galaxia */
.galaxy {
    position: relative;
    width: 100vw;
    height: 100vh;
    transform-style: preserve-3d;
}

/* centro / sol */
.center {
    position: absolute;
    top: 50%;
    left: 50%;
    width: clamp(60px, 18vmin, 110px);
    height: clamp(60px, 18vmin, 110px);
    background: radial-gradient(circle, #ffdb3a, #ff8c00);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 40px #ff8c00, 0 0 80px rgba(255,140,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
    font-size: clamp(0.6rem, 2.5vmin, 1rem);
    z-index: 3;
    color: white;
    text-shadow: 0 0 8px #fff, 0 0 15px #ffdb3a;
    letter-spacing: 1px;
    animation: pulse-text 3s ease-in-out infinite;
    /* mejor área táctil en móvil */
    min-width: 60px;
    min-height: 60px;
}

@keyframes pulse-text {
    0%, 100% {
        text-shadow: 0 0 8px #fff, 0 0 15px #ffdb3a;
        transform: translate(-50%, -50%) scale(1);
    }
    50% {
        text-shadow: 0 0 15px #fff, 0 0 30px #ffdb3a, 0 0 45px #ff8c00;
        transform: translate(-50%, -50%) scale(1.08);
    }
}

/* corona del sol */
.sun-corona {
    position: absolute;
    top: 50%;
    left: 50%;
    width: clamp(90px, 35vmin, 200px);
    height: clamp(90px, 35vmin, 200px);
    background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(255,140,0,0.3) 10%,
        transparent 20%,
        rgba(255,219,58,0.3) 40%,
        transparent 50%,
        rgba(255,140,0,0.3) 70%,
        transparent 80%,
        rgba(255,219,58,0.3) 90%,
        transparent 100%
    );
    border-radius: 50%;
    transform: translate(-50%, -50%);
    filter: blur(15px);
    z-index: 2;
    animation: rotate-corona 20s linear infinite;
    pointer-events: none;
}

@keyframes rotate-corona {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
}

/* órbitas */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    will-change: transform;
}

/* planeta */
.planet {
    position: absolute;
    width: clamp(28px, 6vmin, 48px);
    height: clamp(28px, 6vmin, 48px);
    border-radius: 50%;
    left: 50%;
    transform: translateX(-50%);
    transition: transform 0.3s, filter 0.3s;
    pointer-events: auto;
    cursor: pointer;
    will-change: transform, filter;
    backface-visibility: hidden;
    /* área táctil ampliada para dedos */
    padding: 6px;
    background-clip: content-box;
}

.planet:hover,
.planet.touch-active {
    transform: translateX(-50%) scale(1.2);
    filter: brightness(1.4) drop-shadow(0 0 15px white);
}

.planet:active {
    transform: translateX(-50%) scale(1.4);
}

/* nombre del mes sobre el planeta */
.planet-name {
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(0.5rem, 1.8vmin, 0.7rem);
    color: white;
    text-shadow: 0 0 5px #0077ff;
    white-space: nowrap;
    pointer-events: none;
}

@keyframes rotateReverse {
    from { transform: translateX(-50%) rotate(0deg); }
    to   { transform: translateX(-50%) rotate(-360deg); }
}

/* planeta del futuro */
.future-planet {
    animation: whitePulse 2.5s ease-in-out infinite alternate;
}

@keyframes whitePulse {
    from { box-shadow: 0 0 5px rgba(255,255,255,0.2); }
    to   { box-shadow: 0 0 25px rgba(255,255,255,0.8), 0 0 45px rgba(255,255,255,0.3); }
}

.ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 180%;
    height: 180%;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    transform: translate(-50%, -50%) rotateX(75deg);
    pointer-events: none;
    backface-visibility: hidden;
}

/* animación órbita */
@keyframes rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
}

/* cometas de frases */
.comet {
    position: fixed;
    white-space: nowrap;
    color: white;
    font-weight: bold;
    font-size: clamp(0.55rem, 2vmin, 0.75rem);
    text-shadow: 0 0 5px #fff, 0 0 15px #0077ff;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
}

@keyframes cometFlow {
    0%   { transform: translate(-110%, 0) rotate(-15deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translate(110vw, 50vh) rotate(-15deg); opacity: 0; }
}

/* chispas */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
}

@keyframes sparkleFade {
    0%   { transform: scale(1); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
}

/* modal */
#modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 10;
    padding: 16px;
}

#contenido {
    background: rgba(20,20,20,0.75);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 20px 16px;
    border-radius: 18px;
    text-align: center;
    width: 100%;
    max-width: 400px;
    max-height: 82vh;
    overflow-y: auto;
    overflow-x: hidden;
    border: 1px solid rgba(0,191,255,0.5);
    box-shadow: 0 0 20px rgba(0,191,255,0.6);
    animation: aparecer 0.35s ease;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,191,255,0.4) transparent;
}

#contenido h2 {
    font-size: clamp(0.9rem, 3.5vmin, 1.3rem);
    margin: 8px 0;
}

#contenido p {
    font-size: clamp(0.75rem, 2.5vmin, 0.95rem);
    line-height: 1.6;
    margin: 8px 0 12px;
}

@keyframes aparecer {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
}

/* confeti de corazones */
.heart-confetti {
    position: fixed;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 100;
    user-select: none;
}

@keyframes heartBurst {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% {
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(var(--tr)) scale(1.2);
        opacity: 0;
    }
}

/* galería */
#galeria-imagenes {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
}

#galeria-imagenes img {
    width: calc(50% - 4px);
    max-width: 160px;
    border-radius: 10px;
    object-fit: cover;
    aspect-ratio: 1/1;
    loading: lazy;
}

/* solo una imagen → ocupa todo el ancho */
#galeria-imagenes img:only-child {
    width: 80%;
    max-width: 220px;
}

/* botones */
button {
    margin-top: 14px;
    padding: 13px 22px;
    font-size: clamp(0.6rem, 2vmin, 0.75rem);
    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 50px;
    background: rgba(0,119,255,0.2);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Orbitron', sans-serif;
    cursor: pointer;
    transition: background 0.3s, box-shadow 0.3s, transform 0.15s;
    box-shadow: 0 0 10px rgba(0,119,255,0.2);
    /* mínimo área táctil recomendado por Google */
    min-height: 44px;
    touch-action: manipulation;
}

button:hover,
button:focus {
    background: rgba(0,255,255,0.3);
    border-color: #00ffff;
    box-shadow: 0 0 20px rgba(0,119,255,0.5);
}

button:active {
    transform: scale(0.97);
}

#contenido button {
    width: 100%;
}

/* botón música fijo */
#btn-musica {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    white-space: nowrap;
}

/* contador */
#contador {
    position: fixed;
    bottom: 72px;
    width: 100%;
    text-align: center;
    font-size: clamp(0.6rem, 3vmin, 1rem);
    z-index: 2;
    color: #fff;
    text-shadow: 0 0 10px #00ffff;
    animation: neonPulse 2s infinite alternate;
    padding: 0 8px;
    pointer-events: none;
}

@keyframes neonPulse {
    from { text-shadow: 0 0 10px #00ffff, 0 0 20px #0077ff; }
    to   { text-shadow: 0 0 15px #00ffff, 0 0 30px #0077ff, 0 0 40px #0077ff; opacity: 0.85; }
}

/* Pantallas muy pequeñas (< 380px) */
@media (max-width: 380px) {
    .orbit { transform: translate(-50%, -50%) scale(0.85); }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>Te amo pau mi princesita hermosa</h1>

<div class="galaxy">
    <div class="sun-corona"></div>
    <div class="center" id="btn-sol">Pau + Miki</div>
</div>

<div id="contador"></div>

<div id="modal">
    <div id="contenido">
        <div id="corazon-abril" class="heart-beat">💙</div>
        <h2 id="titulo"></h2>
        <p id="texto"></p>
        <div id="galeria-imagenes"></div>
        <button id="btn-cerrar">Cerrar 💙</button>
    </div>
</div>

<button id="btn-musica">🎶 Música</button>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
/* ─── ESTRELLAS ─── */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

// Debounce resize para no recalcular cada pixel
let resizeTimer;
window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resizeCanvas, 200);
});

// Menos estrellas en móvil para mejor rendimiento
const isMobile = window.innerWidth < 768;
const totalStars = isMobile ? 80 : 150;

const stars = Array.from({ length: totalStars }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 1.5 + 0.3
}));

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    for (const s of stars) {
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.y += 0.15;
        if (s.y > canvas.height) {
            s.y = 0;
            s.x = Math.random() * canvas.width;
        }
    }
    requestAnimationFrame(drawStars);
}
drawStars();

/* ─── RECUERDOS ─── */
const recuerdos = [
    {
        titulo: "Febrero 💫",
        texto: "Aquí comenzó todo… cuando hablar contigo se volvió lo más importante para mí 💖. Nos conocimos en Sweet Dance un 20 de Febrero, ese juego de baile que unió nuestros mundos.",
        img: ["febrero 1.jpeg", "febrero 2.jpeg"]
    },
    {
        titulo: "Marzo 🌙",
        texto: "Entre risas, cartas y momentos juntos… me di cuenta de que ya eras parte de mi vida ✨. Además, celebramos una fecha muy importante: tu cumpleaños el 25 de Marzo.",
        img: ["marzo 1.jpeg", "marzo 2.jpeg"]
    },
    {
        titulo: "Abril 🌌",
        texto: "Pasamos algunos malentendidos y problemitas... pero en una llamada que hicimos dibujamos un corazón juntos y fue muy lindo. Y entendimos que queríamos quedarnos 💕",
        img: ["abril.jpeg"]
    },
    {
        titulo: "Mayo 🌊",
        texto: "Cada día es más especial y quiero seguir construyendo este nuevo planeta contigo mi princesita...",
        img: ["foto4.png"]
    }
];

/* ─── PLANETAS ─── */
const galaxy = document.querySelector(".galaxy");

recuerdos.forEach((r, i) => {
    const orbit  = document.createElement("div");
    orbit.className = "orbit";

    const duration = 12 + i * 4;
    const size     = 30 + i * 18;

    orbit.style.cssText = `width:${size}vmin;height:${size}vmin;animation:rotate ${duration}s linear infinite`;

    const planet = document.createElement("div");
    planet.className = "planet";
    planet.style.top = "-3vmin";

    const hue = (i * 137.5) % 360;

    // Etiqueta mes
    const nameLabel = document.createElement("div");
    nameLabel.className = "planet-name";
    nameLabel.textContent = r.titulo;
    nameLabel.style.animation = `rotateReverse ${duration}s linear infinite`;
    planet.appendChild(nameLabel);

    if (i === recuerdos.length - 1) {
        planet.classList.add("future-planet");
        planet.style.background = "rgba(255,255,255,0.1)";
        planet.style.border = "2px dashed rgba(255,255,255,0.4)";
    } else {
        planet.style.background = `radial-gradient(circle at 30% 30%, hsl(${hue},80%,75%), hsl(${hue},80%,45%))`;
        planet.style.boxShadow  = `0 0 20px hsla(${hue},80%,60%,0.7)`;
    }

    // Anillos (50 % de prob.)
    if (Math.random() > 0.5) {
        const ring = document.createElement("div");
        ring.className = "ring";
        ring.style.borderColor = `hsla(${hue},80%,70%,0.4)`;
        planet.appendChild(ring);
    }

    // Click + Touch
    const openModal = () => mostrar(i);
    planet.addEventListener("click", openModal);
    planet.addEventListener("touchstart", (e) => {
        e.preventDefault();
        planet.classList.add("touch-active");
        setTimeout(() => planet.classList.remove("touch-active"), 300);
        openModal();
    }, { passive: false });

    orbit.appendChild(planet);
    galaxy.appendChild(orbit);
});

/* ─── SOL (click y touch) ─── */
const btnSol = document.getElementById("btn-sol");
btnSol.addEventListener("click", mostrarCartaSol);
btnSol.addEventListener("touchstart", (e) => {
    e.preventDefault();
    mostrarCartaSol();
}, { passive: false });

/* ─── CONFETI ─── */
function lanzarConfeti() {
    const cantidad = isMobile ? 14 : 25;
    for (let i = 0; i < cantidad; i++) {
        const heart = document.createElement("div");
        heart.className = "heart-confetti";
        heart.textContent = "💙";
        heart.style.left = "50vw";
        heart.style.top  = "50vh";

        const tx = (Math.random() - 0.5) * (isMobile ? 240 : 400) + "px";
        const ty = (Math.random() - 0.5) * (isMobile ? 240 : 400) + "px";
        const tr = (Math.random() * 360) + "deg";

        heart.style.setProperty("--tx", tx);
        heart.style.setProperty("--ty", ty);
        heart.style.setProperty("--tr", tr);
        heart.style.animation = `heartBurst ${0.7 + Math.random() * 0.6}s ease-out forwards`;

        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1800);
    }
}

/* ─── MODAL ─── */
function mostrar(i) {
    const r = recuerdos[i];
    document.getElementById("titulo").textContent = r.titulo;
    document.getElementById("texto").textContent  = r.texto;

    const corazon = document.getElementById("corazon-abril");
    corazon.style.display = r.titulo.includes("Abril") ? "block" : "none";

    const galeria = document.getElementById("galeria-imagenes");
    galeria.innerHTML = "";

    r.img.forEach(src => {
        const img = document.createElement("img");
        img.src     = src;
        img.loading = "lazy";
        img.alt     = r.titulo;
        galeria.appendChild(img);
    });

    document.getElementById("modal").style.display = "flex";
    lanzarConfeti();
}

function mostrarCartaSol() {
    document.getElementById("titulo").textContent = "Para mi princesita 💌";
    document.getElementById("texto").textContent  =
        "Gracias por alegrarme el día con tu hermosa voz y con tus hermosas cartas. Gracias simplemente por existir. Me gustas muchísimo y te amo con todo mi corazón, y espero que sigamos construyendo más planetas juntos en nuestra galaxia. 💙";

    document.getElementById("corazon-abril").style.display = "none";
    document.getElementById("galeria-imagenes").innerHTML  = "";
    document.getElementById("modal").style.display = "flex";
    lanzarConfeti();
}

function cerrar() {
    document.getElementById("modal").style.display = "none";
}

document.getElementById("btn-cerrar").addEventListener("click", cerrar);

// Cerrar al tocar fuera del contenido
document.getElementById("modal").addEventListener("touchstart", (e) => {
    if (e.target === document.getElementById("modal")) cerrar();
}, { passive: true });

/* ─── MÚSICA ─── */
document.getElementById("btn-musica").addEventListener("click", () => {
    const audio = document.getElementById("musica");
    if (audio.paused) {
        audio.play();
        document.getElementById("btn-musica").textContent = "⏸ Música";
    } else {
        audio.pause();
        document.getElementById("btn-musica").textContent = "🎶 Música";
    }
});

/* ─── COMETAS ─── */
const frases = ["mi amors","patito","princesita","bella durmiente","miki pelon","bueni","amiguis","patito fresa","principe fresa"];

// Límite de cometas activos para no saturar el DOM
let cometasActivos = 0;
const MAX_COMETAS = isMobile ? 2 : 4;

function crearCometa() {
    if (cometasActivos >= MAX_COMETAS) return;
    cometasActivos++;

    const cometa = document.createElement("div");
    cometa.className = "comet";
    cometa.textContent = frases[Math.floor(Math.random() * frases.length)];

    const startY = Math.random() * 70;
    cometa.style.top  = startY + "vh";
    cometa.style.left = "-100px";

    const duracion = 7 + Math.random() * 5;
    cometa.style.animation = `cometFlow ${duracion}s linear forwards`;

    document.body.appendChild(cometa);

    // Chispas (menos frecuentes en móvil)
    const sparkInterval = isMobile ? 220 : 150;
    const interval = setInterval(() => {
        const rect = cometa.getBoundingClientRect();
        if (rect.left > window.innerWidth || rect.right < 0) return;

        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left       = rect.left + "px";
        sparkle.style.top        = (rect.top + rect.height / 2) + "px";
        sparkle.style.background = `hsl(${Math.random()*40+190},100%,80%)`;
        sparkle.style.boxShadow  = `0 0 6px ${sparkle.style.background}`;
        sparkle.style.animation  = "sparkleFade 0.8s ease-out forwards";

        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 800);
    }, sparkInterval);

    setTimeout(() => {
        clearInterval(interval);
        cometa.remove();
        cometasActivos--;
    }, duracion * 1000);
}

// Intervalo más conservador para móvil
const intervaloCometa = isMobile ? 7000 : 5000;
setInterval(crearCometa, intervaloCometa);

/* ─── CONTADOR ─── */
const inicio = new Date("2026-01-31");

function actualizarContador() {
    const hoy  = new Date();
    const diff = hoy - inicio;

    let meses = (hoy.getFullYear() - inicio.getFullYear()) * 12 + (hoy.getMonth() - inicio.getMonth());
    if (hoy.getDate() < inicio.getDate()) meses--;

    const dias     = Math.floor(diff / 86400000);
    const horas    = Math.floor((diff / 3600000) % 24);
    const minutos  = Math.floor((diff / 60000) % 60);
    const segundos = Math.floor((diff / 1000) % 60);

    document.getElementById("contador").textContent =
        `${meses} meses | ${dias}d ${horas}h ${minutos}m ${segundos}s juntos 💙`;
}

setInterval(actualizarContador, 1000);
actualizarContador(); // ejecutar inmediatamente al cargar
</script>

</body>
</html>
